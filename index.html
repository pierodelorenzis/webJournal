<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Il Gazzettino</title>
    <meta
      name="description"
      content="Un RSS reader in stile giornale cartaceo dedicato al feed del Corriere."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant:ital,wght@0,300..700;1,300..700&family=Fondamento:ital@0;1&family=Manufacturing+Consent&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="paper-grain"></div>
    <main class="page">
      <header class="masthead">
        <div class="masthead-top">
          <div class="masthead-brand">
            <h1>Il Gazzettino</h1>
            <p class="deck">
              Il giornale al tuo fianco.
            </p>
            <p id="issue-date" class="issue-date"></p>
          </div>
          <div class="masthead-actions">
            <button
              id="refresh-feed"
              class="refresh-button"
              type="button"
              aria-controls="stories"
            >
              Aggiorna
            </button>
          </div>
        </div>
      </header>

      <section class="lead-grid" aria-label="Notizie in evidenza">
        <article class="lead-story">
          <div>
            <p class="section-label">Apertura</p>
            <div class="lead-header-row">
              <h2 id="lead-title">Caricamento in corso</h2>
              <div class="story-visual lead-visual">
                <img
                  id="lead-image"
                  class="story-image"
                  alt=""
                  loading="eager"
                  decoding="async"
                />
              </div>
            </div>
            <p class="summary" id="lead-summary">
              Attendi un momento: questa prima pagina si compone automaticamente dal feed
              RSS del Corriere.
            </p>
            <a class="story-link story-link-icon" id="lead-link" href="#" target="_blank" rel="noreferrer">
              <span aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M32 176C32 134.5 63.6 100.4 104 96.4L104 96L384 96C437 96 480 139 480 192L480 368L304 368C264.2 368 232 400.2 232 440L232 500C232 524.3 212.3 544 188 544C163.7 544 144 524.3 144 500L144 272L80 272C53.5 272 32 250.5 32 224L32 176zM268.8 544C275.9 530.9 280 515.9 280 500L280 440C280 426.7 290.7 416 304 416L552 416C565.3 416 576 426.7 576 440L576 464C576 508.2 540.2 544 496 544L268.8 544zM112 144C94.3 144 80 158.3 80 176L80 224L144 224L144 176C144 158.3 129.7 144 112 144z"/></svg></span>
            </a>
          </div>
        </article>
      </section>

      <section class="news-desk">
        <div class="column-head">
          <p class="section-label">Ultime notizie</p>
          <p id="feed-status" class="feed-status">Recupero degli articoli...</p>
        </div>
        <div
          id="stories"
          class="stories"
          aria-live="polite"
          aria-busy="true"
        ></div>
      </section>
    </main>

    <footer class="page-footer">
      <a
        href="https://xml2.corriereobjects.it/feed-hp/homepage-restyle-2025.xml"
        target="_blank"
        rel="noreferrer"
      >
        Fonte RSS
      </a>
    </footer>

    <template id="story-template">
      <article class="story-card">
        <div class="story-visual">
          <img class="story-image" alt="" loading="lazy" decoding="async" />
        </div>
        <div class="story-title-row">
          <h3 class="story-title"></h3>
          <a class="story-link story-link-icon" target="_blank" rel="noreferrer">
            <span aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M32 176C32 134.5 63.6 100.4 104 96.4L104 96L384 96C437 96 480 139 480 192L480 368L304 368C264.2 368 232 400.2 232 440L232 500C232 524.3 212.3 544 188 544C163.7 544 144 524.3 144 500L144 272L80 272C53.5 272 32 250.5 32 224L32 176zM268.8 544C275.9 530.9 280 515.9 280 500L280 440C280 426.7 290.7 416 304 416L552 416C565.3 416 576 426.7 576 440L576 464C576 508.2 540.2 544 496 544L268.8 544zM112 144C94.3 144 80 158.3 80 176L80 224L144 224L144 176C144 158.3 129.7 144 112 144z"/></svg></span>
          </a>
        </div>
        <p class="story-summary"></p>
      </article>
    </template>
    <script src="./app.js"></script>
  </body>
</html>
